<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Browser Environment Comparator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f0f; color: #e5e5e5; font-family: monospace; font-size: 12px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

#toolbar {
  background: #161616; border-bottom: 1px solid #2a2a2a;
  padding: 7px 10px; display: flex; gap: 7px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
}
.btn { padding: 3px 11px; background: #222; color: #ccc; border: 1px solid #444; cursor: pointer; border-radius: 3px; font-family: monospace; font-size: 12px; white-space: nowrap; }
.btn:hover { background: #2e2e2e; }
.btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
.btn.active { background: #1a2e1a; border-color: #4a4; color: #8f8; }
.sep { width: 1px; background: #333; height: 18px; flex-shrink: 0; }
#search { padding: 3px 8px; background: #111; border: 1px solid #444; color: #eee; border-radius: 3px; font-family: monospace; font-size: 12px; width: 170px; }
.filters { display: flex; gap: 5px; }
.filters label { cursor: pointer; color: #888; font-size: 11px; user-select: none; }
#stats { color: #777; font-size: 11px; }
.dfilter-group { display: flex; gap: 3px; }
.dfbtn { padding: 2px 9px; background: #1a1a1a; border: 1px solid #333; color: #666; cursor: pointer; border-radius: 3px; font-size: 11px; white-space: nowrap; }
.dfbtn:hover { border-color: #555; color: #aaa; }
.dfbtn.active { color: #fff; }
.dfbtn[data-f="all"].active     { background: #222; border-color: #666; color: #ccc; }
.dfbtn[data-f="diff"].active    { background: #2a1a00; border-color: #c87; color: #c87; }
.dfbtn[data-f="same"].active    { background: #0a1a0a; border-color: #484; color: #8c8; }
.dfbtn[data-f="missing"].active { background: #1a0a1a; border-color: #85a; color: #b8d; }
#import-drop { border: 1px dashed #444; border-radius: 3px; padding: 3px 10px; color: #666; font-size: 11px; cursor: pointer; white-space: nowrap; }
#import-drop:hover { border-color: #888; color: #bbb; }
#import-drop.has-data { border-color: #4a4; color: #8c8; }
#file-input { display: none; }

/* BODY */
#body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* RESIZE HANDLE — shared style */
.resizer {
  flex-shrink: 0; background: #1e1e1e; position: relative; z-index: 5;
  transition: background 0.1s;
}
.resizer:hover, .resizer.dragging { background: #4a8; }
.resizer.vertical   { width: 4px; cursor: col-resize; }
.resizer.horizontal { height: 4px; cursor: row-resize; }
.resizer::after {
  content: ""; position: absolute; inset: 0;
  /* extend hit area without affecting layout */
  margin: -3px;
}

/* SIDEBAR */
#sidebar { width: 190px; min-width: 80px; max-width: 400px; flex-shrink: 0; background: #111; display: flex; flex-direction: column; overflow: hidden; }
#ns-search-wrap { padding: 5px 6px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0; }
#ns-search { width: 100%; padding: 3px 7px; background: #0d0d0d; border: 1px solid #333; color: #ccc; border-radius: 3px; font-family: monospace; font-size: 11px; }
#ns-search::placeholder { color: #444; }
#sidebar-list { flex: 1; overflow-y: auto; }
.cat-item { padding: 3px 8px; cursor: pointer; color: #666; white-space: nowrap; overflow: hidden; display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.cat-item:hover { background: #1a1a1a; color: #bbb; }
.cat-item.active { background: #1e2a1e; color: #8f8; }
.cat-name { overflow: hidden; text-overflow: ellipsis; flex: 1; font-size: 11px; }
.cat-badge { font-size: 9px; padding: 0 4px; border-radius: 8px; flex-shrink: 0; }
.cb-diff  { background: #3a1500; color: #c87; }
.cb-count { background: #181818; color: #555; }
.cat-all { border-bottom: 1px solid #1e1e1e; }
.cat-all .cat-name { color: #888; font-size: 11px; }

/* MAIN */
#main { flex: 1; display: flex; overflow: hidden; min-height: 0; position: relative; }
#single-pane { flex: 1; overflow-y: auto; padding: 4px 8px; }
#compare-pane { display: none; flex: 1; min-height: 0; overflow: hidden; }

/* COMPARE — flex instead of grid so resizer works */
.cmp-wrap { display: flex; height: 100%; width: 100%; overflow: hidden; }
.cmp-col { display: flex; flex-direction: column; min-width: 80px; min-height: 0; overflow: hidden; }
#cmp-col-a { flex: 0 0 50%; }
#cmp-col-b { flex: 1; }
.col-head { flex-shrink: 0; padding: 5px 10px; background: #141414; border-bottom: 1px solid #222; display: flex; gap: 8px; align-items: center; }
.col-head span { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
.col-head .env-browser { background: #1e2e1e; color: #5a9a5a; border: 1px solid #2a4a2a; border-radius: 3px; padding: 1px 6px; font-size: 10px; letter-spacing: 0; text-transform: none; }
.badge { font-size: 10px; padding: 1px 7px; border-radius: 8px; }
.badge-a { background: #0a1e30; color: #5af; border: 1px solid #1a4060; }
.badge-b { background: #1a0a30; color: #c8f; border: 1px solid #3a1a60; }
.col-body { flex: 1; overflow-y: auto; padding: 4px 8px; }

/* ROWS */
.row { height: 18px; line-height: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-string   { color: #98c379; }
.t-integer  { color: #d19a66; }
.t-float    { color: #e8b070; }
.t-boolean  { color: #56b6c2; }
.t-null     { color: #888; }
.t-object   { color: #4a7aa0; }
.t-function { color: #5a3a7a; }
.t-throws   { color: #5a1818; }
.t-undefined{ color: #3a3a3a; }
.t-symbol   { color: #e5c07b; }
.t-bigint   { color: #d19a66; }
.d-same   { color: #303030; }
.d-only   { color: #c87941; }
.d-absent { color: #1e1e1e; font-style: italic; }
.d-val    { color: #c9a84c; }
.d-type   { color: #c05060; }
.tag { font-size: 9px; padding: 0 4px; border-radius: 2px; margin-left: 5px; vertical-align: middle; }
.tg-only { background: #3a1500; color: #c87; }
.tg-val  { background: #2e2200; color: #ba8; }
.tg-type { background: #2e0808; color: #d66; }

/* TOOLTIP */
#tooltip {
  display: none; position: fixed; z-index: 9999; pointer-events: none;
  background: #0c0c18; border: 1px solid #2a2a3a;
  padding: 6px 10px; font: 11px/1 monospace;
  max-width: 440px; box-shadow: 0 3px 10px rgba(0,0,0,.6);
}
.tt-row   { display: flex; gap: 10px; padding: 2px 0; }
.tt-label { color: #3a3a4a; min-width: 38px; flex-shrink: 0; }
.tt-delta { color: #6af; }
.tt-other { color: #8c8; word-break: break-all; }
.tt-absent{ color: #444; font-style: italic; }

/* LOADING OVERLAY */
#panel-loading {
  position: absolute; inset: 0; z-index: 20;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; background: rgba(12,12,12,0.82); pointer-events: none;

#pl-label { color: #3a9; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }
#pl-bar   { color: #2a7; font-size: 13px; font-family: monospace; letter-spacing: 0; }
#pl-sub   { color: #445; font-size: 11px; }

/* STATUSBAR */
#statusbar {
  flex-shrink: 0; background: #090909; border-top: 1px solid #1a1a1a;
  padding: 3px 12px 4px; display: flex; gap: 18px; align-items: center;

.sb.sb-diff b  { color: #a06030; }
.sb.sb-same b  { color: #2a4a2a; }
.sb.sb-miss b  { color: #5a3a6a; }
.sb.sb-scan    { color: #3a8a5a; flex: 1; }
#sb-bar        { color: #2a6a4a; letter-spacing: 0; }
</style>
</head>

<script>
(function () {
'use strict';

// ───────────────────────────────────────────────────────────────────────
// src/utils.js
// ───────────────────────────────────────────────────────────────────────

const YIELD = () => new Promise(r => setTimeout(r, 0));
const BATCH = 1500;

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function attr(s) {
  return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;");
}

function getCat(path) {
  return path.split(".")[0];
}

function getTypes() {
  const s = new Set();
  document.querySelectorAll(".tf").forEach(c => { if (c.checked) s.add(c.value); });
  return s;
}

function pbar(frac, w = 28) {
  const f = Math.round(Math.max(0, Math.min(1, frac)) * w);
  return "▐" + "█".repeat(f) + "░".repeat(w - f) + "▌";
}

// ───────────────────────────────────────────────────────────────────────
// src/state.js
// ───────────────────────────────────────────────────────────────────────

let curMap      = null;
let impMap      = null;
let cmpMode     = false;
let activeCat   = "__all__";
let diffFilter  = "all";
let renderGen   = 0;
let singleCache = null;
let cmpCache    = null;

const scanBtn    = document.getElementById("scan-btn");
const exportBtn  = document.getElementById("export-btn");
const importDrop = document.getElementById("import-drop");
const fileInput  = document.getElementById("file-input");
const compareBtn = document.getElementById("compare-btn");
const searchEl   = document.getElementById("search");
const nsSearch   = document.getElementById("ns-search");
const singlePane = document.getElementById("single-pane");
const comparePan = document.getElementById("compare-pane");
const badgeA     = document.getElementById("badge-a");
const badgeB     = document.getElementById("badge-b");
const colA       = document.getElementById("col-a");
const colB       = document.getElementById("col-b");
const sidebarList  = document.getElementById("sidebar-list");
const envLabelA    = document.getElementById("env-label-a");
const envLabelB    = document.getElementById("env-label-b");

const plEl    = document.getElementById("panel-loading");
const plLabel = document.getElementById("pl-label");
const plBar   = document.getElementById("pl-bar");
const plSub   = document.getElementById("pl-sub");

const sbKeys  = document.getElementById("sb-keys");
const sbDiff  = document.getElementById("sb-diff");
const sbSame  = document.getElementById("sb-same");
const sbMiss  = document.getElementById("sb-miss");
const sbScan  = document.getElementById("sb-scan");
const sbBarEl = document.getElementById("sb-bar");

// ───────────────────────────────────────────────────────────────────────
// src/walker.js
// ───────────────────────────────────────────────────────────────────────

const PROTO_STOPS = new Set([
  Object.prototype, Function.prototype, EventTarget.prototype,
]);
const SKIP_KEYS = new Set(["prototype", "__proto__", "constructor", "caller", "arguments"]);

function collectKeys(obj) {
  const keys = new Set();
  let cur = obj;
  while (cur !== null && !PROTO_STOPS.has(cur)) {
    for (const k of Reflect.ownKeys(cur))
      if (typeof k === "string" && !SKIP_KEYS.has(k)) keys.add(k);
    cur = Object.getPrototypeOf(cur);
  }
  return keys;
}

function naturalDisplay(val) {
  if (val === null)      return "null";
  if (val === undefined) return "undefined";
  if (typeof val === "string")  return val;
  if (typeof val === "number")  return String(val);
  if (typeof val === "boolean") return String(val);
  if (typeof val === "bigint")  return String(val) + "n";
  if (val instanceof Float32Array || val instanceof Float64Array ||
      val instanceof Int32Array   || val instanceof Uint32Array  ||
      val instanceof Int16Array   || val instanceof Uint8Array)
    return Array.from(val).join(", ");
  if (Array.isArray(val)) return val.join(", ");
  return String(val);
}

async function walk(obj, ns, map, seen, depth) {
  if (depth > 10) return;
  if (obj === null || typeof obj !== "object") return;
  if (seen.has(obj)) return;
  seen.add(obj);

  for (const key of collectKeys(obj)) {
    const path = ns + "." + key;
    let val, threw = false;
    try { val = obj[key]; } catch { threw = true; }

    if (threw) {
      map.set(path, { type: "throws", display: "[throws]" });
      continue;
    }

    const vt = val === null ? "null" : typeof val;

    if (vt === "function") {
      map.set(path, { type: "function", display: "[fn]" });
      continue;
    }

    if (vt === "object") {
      if (Array.isArray(val) && val.length > 0 &&
          val.every(v => v === null || (typeof v !== "object" && typeof v !== "function"))) {
        seen.add(val);
        const sorted = [...val].sort((a, b) => String(a) < String(b) ? -1 : String(a) > String(b) ? 1 : 0);
        map.set(path, { type: "string", display: sorted.join(", ") });
        continue;
      }
      map.set(path, { type: "object", display: "[" + (val?.constructor?.name ?? "Object") + "]" });
      await walk(val, path, map, seen, depth + 1);
      continue;
    }

    const type = vt === "number"
      ? (Number.isInteger(val) ? "integer" : "float")
      : vt;
    map.set(path, { type, display: naturalDisplay(val) });
    if (map.size % 500 === 0) await YIELD();
  }
}

// ───────────────────────────────────────────────────────────────────────

const MATH_PROBES = [

  "prefers-color-scheme:light":   "(prefers-color-scheme: light)",
  "prefers-reduced-motion":       "(prefers-reduced-motion: reduce)",
  "prefers-reduced-transparency": "(prefers-reduced-transparency: reduce)",

// ───────────────────────────────────────────────────────────────────────
// src/constants/permissions.js
// ───────────────────────────────────────────────────────────────────────

const PERMISSION_NAMES = [
  "geolocation",
  "notifications",
  "camera",
  "microphone",
  "clipboard-read",
  "clipboard-write",
  "payment-handler",

// ───────────────────────────────────────────────────────────────────────
// src/constants/webgl.js
// ───────────────────────────────────────────────────────────────────────

const WEBGL_CONSTANT_RANGE = { min: 0x0001, max: 0xFFFF };

// ───────────────────────────────────────────────────────────────────────
// src/constants/integrity.js
// ───────────────────────────────────────────────────────────────────────

const INTEGRITY_NATIVE_FNS = [
  ["Function.prototype.toString",             () => Function.prototype.toString],
  ["Object.getOwnPropertyDescriptor",         () => Object.getOwnPropertyDescriptor],
  ["Object.defineProperty",                   () => Object.defineProperty],
  ["document.createElement",                  () => document.createElement],
  ["window.fetch",                            () => window.fetch],

          return out;

      try { result.numberFormats.default  = new Intl.NumberFormat().format(1234567.89); } catch {}

      try { result.numberFormats.percent  = new Intl.NumberFormat(undefined,{style:"percent"}).format(0.4567); } catch {}

      try { result.listFormat.unit_short   = new Intl.ListFormat(undefined,{style:"short",type:"unit"}).format(["5km","3min"]); } catch {}

        result.displayNames.zh = dnLang.of("zh");
        result.displayNames.ar = dnLang.of("ar");

      try {

  {
    ns: "gpu_fp",
    get: () => {
      if (typeof WebGLRenderingContext === "undefined") return { available: false };
      const canvas = document.createElement("canvas");
      canvas.width = 1; canvas.height = 1;
      const gl = canvas.getContext("webgl");
      if (!gl) return { available: false };

      const prec = gl.getShaderPrecisionFormat(gl.FRAGMENT_SHADER, gl.HIGH_FLOAT);
      const result = {
        available:       true,
        highp_supported: prec && prec.precision > 0,
        highp_range_min: prec?.rangeMin ?? null,
        highp_range_max: prec?.rangeMax ?? null,
        highp_precision: prec?.precision ?? null,
      };

      const VS = `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
      const makeFS = expr =>
        `precision highp float;uniform float u_a,u_b;void main(){` +
        `float v=clamp((${expr}+${GPU_FP_BIAS}.0)/${GPU_FP_RANGE}.0,0.,1.);` +
        `float n=floor(v*16777215.0);` +
        `gl_FragColor=vec4(floor(n/65536.0)/255.0,floor(mod(n,65536.0)/256.0)/255.0,mod(n,256.0)/255.0,1.0);}`;

      const mkShader = (type, src) => {
        const s = gl.createShader(type);
        gl.shaderSource(s, src); gl.compileShader(s);
        return gl.getShaderParameter(s, gl.COMPILE_STATUS) ? s : (gl.deleteShader(s), null);
      };

      const vs = mkShader(gl.VERTEX_SHADER, VS);
      if (!vs) return { available: true, error: "vs_compile_failed" };

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

      const run = (expr, a, b) => {
        const fs = mkShader(gl.FRAGMENT_SHADER, makeFS(expr));
        if (!fs) return null;
        const prog = gl.createProgram();
        gl.attachShader(prog, vs); gl.attachShader(prog, fs);
        gl.linkProgram(prog);
        if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
          gl.deleteProgram(prog); gl.deleteShader(fs); return null;
        }
        gl.useProgram(prog);
        const pl = gl.getAttribLocation(prog, "p");
        gl.enableVertexAttribArray(pl);
        gl.vertexAttribPointer(pl, 2, gl.FLOAT, false, 0, 0);
        gl.uniform1f(gl.getUniformLocation(prog, "u_a"), a);
        gl.uniform1f(gl.getUniformLocation(prog, "u_b"), b);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        const px = new Uint8Array(4);
        gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
        gl.deleteProgram(prog); gl.deleteShader(fs);
        const n = px[0] * 65536 + px[1] * 256 + px[2];
        return Math.round((n / 16777215 * GPU_FP_RANGE - GPU_FP_BIAS) * 1e7) / 1e7;
      };

      result.tests = {};
      for (const [name, expr, a = 0, b = 0] of GPU_FP_TESTS)
        try { result.tests[name] = run(expr, a, b); } catch { result.tests[name] = null; }

      gl.deleteShader(vs);
      gl.deleteBuffer(buf);
      return result;
    }
  },

  {
    ns: "wasm",
    get: () => {
      const result = { available: typeof WebAssembly !== "undefined" };
      if (!result.available) return result;
      result.validate = WebAssembly.validate(new Uint8Array([0,97,115,109,1,0,0,0]));
      result.features = {};

      } catch { result.audioSendCodecs = null; }
      try {
        const vc = RTCRtpSender.getCapabilities("video");
        result.videoSendCodecs = vc?.codecs?.map(c => ({ mimeType: c.mimeType, clockRate: c.clockRate, sdpFmtpLine: c.sdpFmtpLine ?? null })) ?? null;
      } catch { result.videoSendCodecs = null; }
      try {

        result.audioRecvCodecs = ar?.codecs?.map(c => ({ mimeType: c.mimeType, clockRate: c.clockRate, channels: c.channels })) ?? null;

      }

      const el = document.createElement("div");
      el.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;visibility:hidden";
      document.body.appendChild(el);

      scheduler:          typeof window.scheduler !== "undefined",
      idleDetector:       typeof window.IdleDetector !== "undefined",
      windowManagement:   typeof window.getScreenDetails === "function",
      screenOrientation:  typeof screen.orientation !== "undefined",

ACTIVATORS.push({
  ns: "integrity",
  get: () => {
    const descToString = Object.getOwnPropertyDescriptor(Function.prototype, "toString")?.value;
    const nativeStr = fn => {
      if (typeof fn !== "function") return null;
      try { return (descToString || Function.prototype.toString).call(fn); } catch { return null; }
    };
    const isNative = fn => {
      const s = nativeStr(fn);
      return s === null ? null : s.includes("[native code]");
    };
    const descInfo = (obj, key) => {
      try {
        const d = Object.getOwnPropertyDescriptor(obj, key);
        if (!d) return null;
        return { configurable: d.configurable, writable: d.writable, enumerable: d.enumerable, hasGet: !!d.get, hasSet: !!d.set };
      } catch { return null; }
    };

    const native = {};
    for (const [label, getFn] of INTEGRITY_NATIVE_FNS) {
      try { native[label] = isNative(getFn()); } catch { native[label] = null; }
    }

    const proto = {};
    for (const [label, getPair] of INTEGRITY_PROTO_PAIRS) {
      try {
        const [obj, expectedProto] = getPair();
        proto[label] = Object.getPrototypeOf(obj) === expectedProto;
      } catch { proto[label] = null; }
    }

    const descriptors = {};
    for (const [obj, key] of INTEGRITY_DESCRIPTORS) {
      try { descriptors[obj.constructor?.name + "." + key] = descInfo(obj, key); } catch {}
    }

    const ownKeyDelta = {};
    const nativeNavKeys   = Object.getOwnPropertyNames(Navigator.prototype).length;
    const nativeScreenKeys= Object.getOwnPropertyNames(Screen.prototype).length;
    const actualNavKeys   = Object.getOwnPropertyNames(navigator).length;
    ownKeyDelta["Navigator.prototype.keys"]  = nativeNavKeys;
    ownKeyDelta["Screen.prototype.keys"]     = nativeScreenKeys;
    ownKeyDelta["navigator.own.keys"]        = actualNavKeys;
    ownKeyDelta["navigator.own.unexpected"]  = actualNavKeys > 0;

    const toStringTag = {};
    for (const [label, obj] of [
      ["window",      window],
      ["navigator",   navigator],
      ["document",    document],
      ["location",    location],
      ["screen",      screen],
      ["performance", performance],
    ]) {
      try { toStringTag[label] = Object.prototype.toString.call(obj); } catch { toStringTag[label] = null; }
    }

    const consistency = {};
    try { consistency["navigator.userAgent.value"]  = navigator.userAgent; } catch {}
    try { consistency["navigator.userAgent.desc"]   = Object.getOwnPropertyDescriptor(Navigator.prototype, "userAgent")?.get?.call(navigator); } catch {}
    consistency["userAgent.matches"] = consistency["navigator.userAgent.value"] === consistency["navigator.userAgent.desc"];

    try { consistency["screen.width.value"]  = screen.width; } catch {}
    try { consistency["screen.width.desc"]   = Object.getOwnPropertyDescriptor(Screen.prototype, "width")?.get?.call(screen); } catch {}
    consistency["screen.width.matches"] = consistency["screen.width.value"] === consistency["screen.width.desc"];

    return {
      webdriver:   navigator.webdriver,
      native,
      proto,
      descriptors,
      ownKeyDelta,
      toStringTag,
      consistency,
    };
  }
});

async function scanAll(onProgress) {
  const map     = new Map();
  const seen    = new WeakSet();
  const winSeen = new WeakSet();

  onProgress?.("window", 0);
  await walk(window, "window", map, winSeen, 0);

  for (const { ns, get } of ACTIVATORS) {
    onProgress?.(ns, map.size);
    await YIELD();
    try {
      let obj = get();
      if (obj instanceof Promise) obj = await obj;
      if (obj == null) continue;

      if (typeof obj === "object") {
        map.set(ns, { type: "object", display: "[" + (obj?.constructor?.name ?? "Object") + "]" });
        await walk(obj, ns, map, seen, 0);
      } else {
        map.set(ns, { type: typeof obj, display: naturalDisplay(obj) });
      }
    } catch(e) {
      map.set(ns, { type: "throws", display: "[throws: " + e.message + "]" });
    }
  }

  return map;
}

function cmpRow(cls, content, myEntry, otherVal, otherType) {
  let d = '';
  if (myEntry)          d += ` data-val="${attr(myEntry.display)}" data-type="${myEntry.type}"`;
  if (otherVal != null) d += ` data-other="${attr(otherVal)}"`;
  if (otherType)        d += ` data-otype="${otherType}"`;
  return `<div class="row ${cls}"${d}>${content}</div>`;
}

const TAG_ONLY   = '<span class="tag tg-only">only here</span>';
const TAG_VAL    = '<span class="tag tg-val">≠ val</span>';
const mkTypeTag  = (f, t) => `<span class="tag tg-type">≠ type (${esc(f)}→${esc(t)})</span>`;

async function buildSingleCache() {
  singleCache = new Map([["__all__", []]]);
  let n = 0;
  for (const [path, e] of curMap) {
    const text  = path + " = " + e.display;
    const html  = `<div class="row t-${e.type}" data-path="${attr(path)}" data-val="${attr(e.display)}" data-type="${e.type}">${esc(text)}</div>`;
    const entry = { html, text, type: e.type };
    const cat   = getCat(path);
    if (!singleCache.has(cat)) singleCache.set(cat, []);
    singleCache.get(cat).push(entry);
    singleCache.get("__all__").push(entry);
    if (++n % 2000 === 0) await YIELD();
  }
}

async function buildCmpCache() {
  cmpCache = new Map([["__all__", { diff: [], same: [], miss: [], all: [] }]]);
  const allPaths = new Set([...curMap.keys(), ...impMap.keys()]);
  let n = 0;

  for (const path of allPaths) {
    const a = curMap.get(path), b = impMap.get(path);
    const ta = path + (a ? " = " + a.display : " = —");
    const tb = path + (b ? " = " + b.display : " = —");

    const state = (a && b)
      ? (a.type !== b.type ? "type" : a.display !== b.display ? "val" : "same")
      : (a ? "only-a" : "only-b");

    let aHtml, bHtml;
    if (state === "same") {
      aHtml = `<div class="row d-same">${esc(ta)}</div>`;
      bHtml = `<div class="row d-same">${esc(tb)}</div>`;
    } else if (state === "only-a") {
      aHtml = cmpRow("d-only",   esc(ta) + TAG_ONLY,              a,    "—",       null);
      bHtml = cmpRow("d-absent", esc(path) + " = —",              null, a.display, a.type);
    } else if (state === "only-b") {
      aHtml = cmpRow("d-absent", esc(path) + " = —",              null, b.display, b.type);
      bHtml = cmpRow("d-only",   esc(tb) + TAG_ONLY,              b,    "—",       null);
    } else if (state === "val") {
      aHtml = cmpRow("d-val",    esc(ta) + TAG_VAL,               a,    b.display, b.type);
      bHtml = cmpRow("d-val",    esc(tb) + TAG_VAL,               b,    a.display, a.type);
    } else {
      aHtml = cmpRow("d-type",   esc(ta) + mkTypeTag(a.type, b.type), a, b.display, b.type);
      bHtml = cmpRow("d-type",   esc(tb) + mkTypeTag(b.type, a.type), b, a.display, a.type);
    }

    const bucket = state === "same" ? "same" : (state === "only-a" || state === "only-b") ? "miss" : "diff";
    const entry  = { aHtml, bHtml, ta, tb, typeA: a?.type ?? null, typeB: b?.type ?? null };
    const cat    = getCat(path);

    if (!cmpCache.has(cat)) cmpCache.set(cat, { diff: [], same: [], miss: [], all: [] });
    cmpCache.get(cat)[bucket].push(entry);
    cmpCache.get(cat).all.push(entry);
    cmpCache.get("__all__")[bucket].push(entry);
    cmpCache.get("__all__").all.push(entry);

    if (++n % 2000 === 0) await YIELD();
  }
}

}
function hideLoading() { plEl.classList.remove("visible"); }

function setScan(msg)          { sbScan.textContent = msg; sbBarEl.textContent = ""; }
function setScanBar(frac, msg) { sbScan.textContent = msg; sbBarEl.textContent = pbar(frac, 20); }
function clearStatus()         { sbKeys.textContent="—"; sbDiff.textContent="—"; sbSame.textContent="—"; sbMiss.textContent="—"; sbScan.textContent=""; sbBarEl.textContent=""; }

function setViewStatus(shown, total) {
  sbKeys.textContent = shown.toLocaleString() + " / " + total.toLocaleString();
  sbDiff.textContent = "—"; sbSame.textContent = "—"; sbMiss.textContent = "—";
}
function setCmpStatus(shown, nDiff, nSame, nMiss) {
  sbKeys.textContent = shown.toLocaleString();
  sbDiff.textContent = nDiff.toLocaleString();
  sbSame.textContent = nSame.toLocaleString();
  sbMiss.textContent = nMiss.toLocaleString();
}

async function stream(gen, entries, filter, flush, onDone) {
  const total = entries.length;
  let pending = [], nShown = 0;
  for (let i = 0; i < total; i++) {
    if (renderGen !== gen) { hideLoading(); return false; }
    const item = filter(entries[i]);
    if (item == null) continue;
    pending.push(item);
    nShown++;
    if (nShown % BATCH === 0) {
      flush(pending, i / total, nShown);
      pending = [];
      await YIELD();
    }
  }
  if (renderGen !== gen) { hideLoading(); return false; }
  if (pending.length) flush(pending, 1, nShown);
  onDone(nShown);
  return true;
}

async function renderSingle(gen) {
  if (!singleCache) { showLoading("indexing", "…"); await buildSingleCache(); }
  if (renderGen !== gen) { hideLoading(); return; }

  const types   = getTypes();
  const q       = searchEl.value.toLowerCase();
  const entries = singleCache.get(activeCat) || [];
  const total   = entries.length;
  showLoading("loading", activeCat === "__all__" ? "all" : activeCat);
  singlePane.innerHTML = "";

  await stream(gen, entries,
    e => (!types.has(e.type) || (q && !e.text.toLowerCase().includes(q))) ? null : e.html,
    (items, frac, nShown) => {
      singlePane.insertAdjacentHTML("beforeend", items.join(""));
      updateLoading(frac, nShown.toLocaleString() + " rows");
      setScanBar(frac, nShown.toLocaleString() + " / " + total.toLocaleString());
    },
    nShown => {
      hideLoading();
      setViewStatus(nShown, curMap.size);
      sbScan.textContent = ""; sbBarEl.textContent = "";
    }
  );
}

async function renderCompare(gen) {
  if (!cmpCache) { showLoading("indexing", "building comparison cache…"); await buildCmpCache(); }
  if (renderGen !== gen) { hideLoading(); return; }

  const types   = getTypes();
  const q       = searchEl.value.toLowerCase();
  const catData = cmpCache.get(activeCat) || { diff: [], same: [], miss: [], all: [] };
  const entries = { diff: catData.diff, same: catData.same, missing: catData.miss }[diffFilter] ?? catData.all;
  showLoading("comparing", (activeCat === "__all__" ? "all" : activeCat) + " · " + diffFilter);
  colA.innerHTML = ""; colB.innerHTML = "";

  await stream(gen, entries,
    e => (!types.has(e.typeA) && !types.has(e.typeB)) ||
         (q && !e.ta.toLowerCase().includes(q) && !e.tb.toLowerCase().includes(q)) ? null : e,
    (items, frac, nShown) => {
      colA.insertAdjacentHTML("beforeend", items.map(e => e.aHtml).join(""));
      colB.insertAdjacentHTML("beforeend", items.map(e => e.bHtml).join(""));
      updateLoading(frac, nShown.toLocaleString() + " / " + entries.length.toLocaleString());
      setScanBar(frac, nShown.toLocaleString() + " / " + entries.length.toLocaleString());
    },
    nShown => {
      hideLoading();
      setCmpStatus(nShown, catData.diff.length, catData.same.length, catData.miss.length);
      sbScan.textContent = ""; sbBarEl.textContent = "";
    }
  );
}

async function renderContent() {
  const gen = ++renderGen;
  if (cmpMode && curMap && impMap) {
    singlePane.style.display = "none";
    comparePan.style.display = "flex";
    await renderCompare(gen);
  } else {
    comparePan.style.display = "none";
    singlePane.style.display = "";
    if (curMap) await renderSingle(gen);
  }
}

async function render() { buildSidebar(); await renderContent(); }

// ───────────────────────────────────────────────────────────────────────
// src/sidebar.js
// ───────────────────────────────────────────────────────────────────────

function valueMatchesCat(cat, q) {
  for (const m of [curMap, impMap]) {
    if (!m) continue;
    for (const [path, e] of m)
      if (getCat(path) === cat && (path + " " + e.display).toLowerCase().includes(q))
        return true;
  }
  return false;
}

function buildSidebar() {
  const types = getTypes();
  const nsQ   = nsSearch.value.toLowerCase();
  const src   = curMap || impMap;
  if (!src) return;

  const allPaths = (cmpMode && impMap)
    ? new Set([...curMap.keys(), ...impMap.keys()])
    : new Set(src.keys());

  const cats = new Map();
  for (const path of allPaths) {
    const cat   = getCat(path);
    const entry = curMap?.get(path) || impMap?.get(path);
    if (!types.has(entry?.type)) continue;
    if (!cats.has(cat)) cats.set(cat, { total: 0, diffs: 0 });
    const c = cats.get(cat);
    c.total++;
    if (cmpMode && impMap) {
      const a = curMap?.get(path), b = impMap?.get(path);
      if (!a || !b || a.type !== b.type || a.display !== b.display) c.diffs++;
    }
  }

  const sorted = [...cats.entries()].sort((a, b) => b[1].total - a[1].total);
  let totalAll = 0, totalDiffs = 0;
  for (const [, v] of cats) { totalAll += v.total; totalDiffs += v.diffs; }

  sidebarList.innerHTML = "";

  if (!nsQ) {
    const el = document.createElement("div");
    el.className = "cat-item cat-all" + (activeCat === "__all__" ? " active" : "");
    el.dataset.cat = "__all__";
    const badge = cmpMode && totalDiffs
      ? `<span class="cat-badge cb-diff">${totalDiffs}</span>`
      : `<span class="cat-badge cb-count">${totalAll}</span>`;
    el.innerHTML = `<span class="cat-name">* all</span>${badge}`;
    sidebarList.appendChild(el);
  }

  for (const [name, info] of sorted) {
    const nameMatch  = !nsQ || name.toLowerCase().includes(nsQ);
    const valueMatch = nsQ && !nameMatch && valueMatchesCat(name, nsQ);
    if (!nameMatch && !valueMatch) continue;

    const el = document.createElement("div");
    el.className = "cat-item" + (activeCat === name ? " active" : "");
    el.dataset.cat = name;
    if (valueMatch) el.dataset.valueMatch = "1";
    const badge = cmpMode && info.diffs
      ? `<span class="cat-badge cb-diff">${info.diffs}</span>`
      : `<span class="cat-badge cb-count">${info.total}</span>`;
    el.innerHTML = `<span class="cat-name">${esc(name)}</span>${badge}`;
    sidebarList.appendChild(el);
  }
}

sidebarList.addEventListener("click", e => {
  const item = e.target.closest(".cat-item"); if (!item) return;
  activeCat = item.dataset.cat;
  if (item.dataset.valueMatch) {
    searchEl.value = nsSearch.value;
    nsSearch.value = "";
    buildSidebar();
  }
  sidebarList.querySelectorAll(".cat-item").forEach(el =>
    el.classList.toggle("active", el.dataset.cat === activeCat));
  renderContent();
});

// ───────────────────────────────────────────────────────────────────────
// src/ui.js
// ───────────────────────────────────────────────────────────────────────

const tooltip = document.getElementById("tooltip");

function detectBrowser() {
  const ua = navigator.userAgent;
  if (/Edg\//.test(ua))     return "Edge "    + (ua.match(/Edg\/([\d]+)/)     || ["","?"])[1];
  if (/OPR\//.test(ua))     return "Opera "   + (ua.match(/OPR\/([\d]+)/)     || ["","?"])[1];
  if (/Chrome\//.test(ua))  return "Chrome "  + (ua.match(/Chrome\/([\d]+)/)  || ["","?"])[1];
  if (/Firefox\//.test(ua)) return "Firefox " + (ua.match(/Firefox\/([\d]+)/) || ["","?"])[1];
  if (/Safari\//.test(ua))  return "Safari "  + (ua.match(/Version\/([\d]+)/) || ["","?"])[1];
  return "Browser";
}

function ttRow(label, valHtml) {
  return '<div class="tt-row"><span class="tt-label">' + label + '</span>' + valHtml + '</div>';
}

function tooltipHTML(myVal, otherVal, myType, otherType) {
  if (otherVal === undefined) return null;
  const rows = [];
  const absent = otherVal === "—" || otherVal === "";

  if (myType && otherType && myType !== otherType)
    rows.push(ttRow("type", '<span class="tt-delta">' + esc(myType) + ' → ' + esc(otherType) + '</span>'));

  if (absent) {
    rows.push('<div class="tt-absent">not present in other environment</div>');
  } else {
    const numTypes = new Set(["integer", "float"]);
    if (numTypes.has(myType) && numTypes.has(otherType)) {
      const a = parseFloat(myVal), b = parseFloat(otherVal);
      if (!isNaN(a) && !isNaN(b)) {
        const d = b - a;
        rows.push(ttRow("Δ",     '<span class="tt-delta">' + (d >= 0 ? "+" : "") + d + '</span>'));
        rows.push(ttRow("ratio", '<span class="tt-delta">' + (a !== 0 ? (b / a).toFixed(4) + "×" : "∞") + '</span>'));
      }
    }
    rows.push(ttRow("other", '<span class="tt-other">' + esc(otherVal) + '</span>'));
  }
  return rows.join("");
}

function posTooltip(x, y) {
  tooltip.style.left = (x + 16) + "px";
  tooltip.style.top  = (y + 14) + "px";
  const r = tooltip.getBoundingClientRect();
  if (r.right  > window.innerWidth)  tooltip.style.left = (x - r.width  - 8) + "px";
  if (r.bottom > window.innerHeight) tooltip.style.top  = (y - r.height - 8) + "px";
}

document.addEventListener("mousemove", e => {
  const row = e.target.closest(".row");
  if (!row) { tooltip.style.display = "none"; return; }

  let html = null;

  if (row.hasAttribute("data-other")) {
    html = tooltipHTML(row.dataset.val, row.dataset.other, row.dataset.type, row.dataset.otype);
  } else if (row.hasAttribute("data-path") && impMap && impMap.size > 0) {
    const path = row.dataset.path;
    const imp  = impMap.get(path);
    if (imp) {
      html = tooltipHTML(row.dataset.val, imp.display, row.dataset.type ?? "", imp.type);
    } else {
      html = '<div class="tt-absent">not present in imported environment</div>';
    }
  }

  if (html) {
    tooltip.innerHTML = html;
    tooltip.style.display = "block";
    posTooltip(e.clientX, e.clientY);
  } else {
    tooltip.style.display = "none";
  }
});

document.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });

envLabelA.textContent = detectBrowser();

let syncing = false;
colA.addEventListener("scroll", () => { if (!syncing) { syncing=true; colB.scrollTop=colA.scrollTop; syncing=false; } });
colB.addEventListener("scroll", () => { if (!syncing) { syncing=true; colA.scrollTop=colB.scrollTop; syncing=false; } });

scanBtn.onclick = async function() {
  scanBtn.disabled = true;
  clearStatus();
  showLoading("scanning", "window…");
  try {
    curMap = await scanAll((ns, count) => {
      setScan("scanning " + ns + "…  " + count.toLocaleString() + " keys");
      plLabel.textContent = "scanning";
      plSub.textContent   = ns + "  (" + count.toLocaleString() + " keys)";
    });
    singleCache = null; cmpCache = null;
    hideLoading();
    badgeA.textContent = curMap.size.toLocaleString() + " keys";
    exportBtn.disabled = false;
    if (impMap) compareBtn.disabled = false;
    activeCat = ACTIVATORS[0].ns;
    await render();
  } catch(e) {
    hideLoading();
    setScan("error: " + e.message);
  }
  scanBtn.disabled = false;
};

exportBtn.onclick = function() {
  if (!curMap || curMap.size === 0) return;
  const data = {
    __meta__: { browser: detectBrowser(), ua: navigator.userAgent, ts: Date.now() },
    ...Object.fromEntries(curMap),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = "env-" + detectBrowser().toLowerCase().replace(/\s+/, "-") + "-" + Date.now() + ".json";
  a.click();
};

function normalizeEntry(v) {
  if (v?.type === "number") {
    const n = parseFloat(v.display);
    return { ...v, type: Number.isInteger(n) ? "integer" : "float" };
  }
  return v;
}

function loadImport(text) {
  try {
    const raw  = JSON.parse(text);
    const meta = raw.__meta__;
    impMap = new Map(
      Object.entries(raw)
        .filter(([k]) => k !== "__meta__")
        .map(([k, v]) => [k, normalizeEntry(v)])
    );
    cmpCache = null;
    badgeB.textContent      = impMap.size.toLocaleString() + " keys";
    importDrop.textContent  = "✓ " + impMap.size.toLocaleString() + " keys";
    importDrop.classList.add("has-data");
    envLabelB.textContent   = meta?.browser ?? "Imported environment";
    if (curMap) {
      compareBtn.disabled = false;
      cmpMode = true;
      compareBtn.classList.add("active");
      compareBtn.textContent = "✕ Exit compare";
    }
    render();
  } catch(e) { alert("Bad JSON: " + e.message); }
}

importDrop.onclick = () => fileInput.click();
fileInput.onchange = function() {
  const f = fileInput.files[0]; if (!f) return;
  const r = new FileReader(); r.onload = e => loadImport(e.target.result); r.readAsText(f);
};
importDrop.addEventListener("dragover", e => e.preventDefault());
importDrop.addEventListener("drop", e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0]; if (!f) return;
  const r = new FileReader(); r.onload = ev => loadImport(ev.target.result); r.readAsText(f);
});

compareBtn.onclick = function() {
  cmpMode = !cmpMode;
  compareBtn.classList.toggle("active", cmpMode);
  compareBtn.textContent = cmpMode ? "✕ Exit compare" : "⇌ Compare";
  if (!cmpMode) {
    diffFilter = "all";
    document.querySelectorAll(".dfbtn").forEach(b => b.classList.toggle("active", b.dataset.f === "all"));
  }
  render();
};

document.querySelectorAll(".dfbtn").forEach(btn => {
  btn.addEventListener("click", () => {
    diffFilter = btn.dataset.f;
    document.querySelectorAll(".dfbtn").forEach(b => b.classList.toggle("active", b === btn));
    renderContent();
  });
});

searchEl.addEventListener("input", debounce(render, 250));
nsSearch.addEventListener("input", debounce(buildSidebar, 150));
document.querySelectorAll(".tf").forEach(c => c.addEventListener("change", render));

function makeResizer(resizerEl, getA, setA, getTotal) {
  let dragging=false, startX=0, startW=0;
  resizerEl.addEventListener("mousedown", e => {
    dragging=true; startX=e.clientX; startW=getA();
    resizerEl.classList.add("dragging");
    document.body.style.cursor="col-resize"; document.body.style.userSelect="none";
    e.preventDefault();
  });
  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const newW = Math.max(80, Math.min(getTotal()-80, startW+(e.clientX-startX)));
    setA(newW);
  });
  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging=false; resizerEl.classList.remove("dragging");
    document.body.style.cursor=""; document.body.style.userSelect="";
  });
}
makeResizer(
  document.getElementById("resizer-sidebar"),
  () => document.getElementById("sidebar").offsetWidth,
  w  => { document.getElementById("sidebar").style.width = w+"px"; },
  () => document.getElementById("body").offsetWidth
);
makeResizer(
  document.getElementById("resizer-panes"),
  () => document.getElementById("cmp-col-a").offsetWidth,
  w  => { const el=document.getElementById("cmp-col-a"); el.style.flex="none"; el.style.width=w+"px"; },
  () => document.getElementById("compare-pane").offsetWidth
);


})();
